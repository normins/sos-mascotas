<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Voluntarios</title>

  <!-- CSS GLOBAL -->
  <link rel="stylesheet" href="../styles-global.css">

  <!-- CSS PROPIO -->
  <link rel="stylesheet" href="voluntarios.css">
</head>

<body>

<header>
  <div class="logo">SOS Mascotas 🐾</div>

  <ul class="nav-links">
    <li><a href="../index.html">Inicio</a></li>
    <li><a href="../muro/index.html">Muro</a></li>
    <li><a href="../donaciones/index.html">Donaciones</a></li>
    <li><a href="../match/match.html">Match</a></li>
    <li><a href="voluntarios.html" class="active">Voluntarios</a></li>
    <li><a href="../auth/index.html" id="nav-login">Ingresar </a></li>
    <li><a href="#" id="nav-logout" style="display: none; color: salmon; font-weight: bold;">Salir 🚪</a></li>
    
  </ul>
</header>

<main class="voluntarios-container">

  <div class="header-titulos">
    <h1 class="titulo-pagina">Unite como Voluntario 🤝</h1>
    <p class="subtitulo-pagina">
      Tu ayuda puede cambiar la vida de muchos animales 🐾
    </p>
  </div>

  <section class="form-panel">

    <form id="form-voluntario">

      <div class="grupo-input">
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" required>
      </div>

      <div class="grupo-input">
        <label for="email">Email</label>
        <input type="email" id="email" required>
      </div>

      <div class="grupo-input">
        <label for="telefono">Teléfono</label>
        <input type="text" id="telefono">
      </div>

      <div class="grupo-input">
        <label for="tipo">Tipo de ayuda</label>
        <select id="tipo">
          <option value="">Seleccionar</option>
          <option>Tránsito</option>
          <option>Traslado</option>
          <option>Difusión</option>
        </select>
      </div>

      <div class="grupo-input">
        <label for="disponibilidad">Disponibilidad</label>
        <textarea id="disponibilidad"></textarea>
      </div>

      <button type="submit" class="btn-primary">
        Enviar
      </button>

    </form>

  </section>

</main>

<script src="voluntarios.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const usuarioLogueado = JSON.parse(localStorage.getItem('usuario'));
    const loginLink = document.getElementById('nav-login');
    const logoutLink = document.getElementById('nav-logout'); // Capturamos el botón Salir

    if (usuarioLogueado && loginLink) {
      // 1. Cambiamos el texto al nombre del usuario
      loginLink.textContent = `Mi Perfil (${usuarioLogueado.nombre})`;
      
      loginLink.href = "../auth/index.html"; 

      // 2. Hacemos visible el botón de Cerrar Sesión
      if (logoutLink) {
        logoutLink.style.display = "inline-block";
        
        // 3. Escuchamos el clic para limpiar la sesión
        logoutLink.addEventListener("click", (e) => {
          e.preventDefault();
          localStorage.removeItem('usuario'); // Borra la sesión del navegador
          alert("Sesión cerrada correctamente. ¡Hasta luego! 🐾");
          
          // Redirecciona al inicio de forma limpia
          // Si estás en subcarpeta usa "../index.html", si estás en la raíz usa "index.html"
          window.location.href = "index.html"; 
        });
      }
    }
  });
</script>

</body>
</html>
