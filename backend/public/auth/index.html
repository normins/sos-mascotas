<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SOS Mascotas</title>

  <link rel="stylesheet" href="/auth/styles.css">
  <link rel="stylesheet" href="/styles-global.css">
</head>

<body>

  <header>
      <div class="logo">SOS Mascotas 🐾</div>

      <ul class="nav-links">
        <li><a href="../index.html">Inicio</a></li>
        <li><a href="../muro/index.html">Muro</a></li>
        <li><a href="../donaciones/index.html">Donaciones</a></li>
        <li><a href="../match/match.html">Match</a></li>
        <li><a href="../voluntarios/voluntarios.html">Voluntarios</a></li>
        <li><a href="index.html" id="nav-login" class="active">Ingresar 👤</a></li>
        <li><a href="#" id="nav-logout" style="display: none; color: salmon; font-weight: bold;">Salir 🚪</a></li>
      </ul>
  </header>

  <div class="login-container">

    <div class="login-card">

      <h1>SOS Mascotas 🐾</h1>

      <p class="subtitle">
        Iniciá sesión para continuar
      </p>

      <form id="loginForm">

        <input 
          type="email"
          id="email"
          placeholder="Correo electrónico"
          required
        >

        <input 
          type="password"
          id="password"
          placeholder="Contraseña"
          required
        >

        <button type="submit">
          Ingresar
        </button>

      </form>

      <p class="switch-form">
        ¿No tenés cuenta?
        <span id="showRegister">
        Registrate
        </span>
      </p>

      <p id="message"></p>

  <form id="registerForm" style="display:none;">

    <p class="subtitle">
      ¿Ya tenés cuenta?
      <a href="#" id="showLogin">
        Iniciá sesión
      </a>
    </p>

    <input
      type="text"
      id="registerName"
      placeholder="Nombre"
      required
    >

    <input
      type="email"
      id="registerEmail"
      placeholder="Correo electrónico"
      required
    >

    <input
      type="password"
      id="registerPassword"
      placeholder="Contraseña"
      required
    >

    <button type="submit">
      Registrarse
    </button>

      </form>
    </div>

  </div>

  <script src="login.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const usuarioLogueado = JSON.parse(localStorage.getItem('usuario'));
      const loginLink = document.getElementById('nav-login');
      const logoutLink = document.getElementById('nav-logout');

      if (usuarioLogueado) {
        // Si ya está logueado dentro de auth/index.html, el menú superior se actualiza
        if (loginLink) {
          loginLink.textContent = `Mi Perfil (${usuarioLogueado.nombre})`;
          loginLink.href = "index.html"; // Ruta circular correcta a sí mismo
        }

        // Hacemos visible el botón Salir del menú por si quiere desloguearse desde acá
        if (logoutLink) {
          logoutLink.style.display = "inline-block";
          logoutLink.addEventListener("click", (e) => {
            e.preventDefault();
            localStorage.removeItem('usuario');
            alert("Sesión cerrada correctamente. ¡Hasta luego! 🐾");
            window.location.href = "../index.html"; 
          });
        }
      }
    });
  </script>

</body>
</html>
