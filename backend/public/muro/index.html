<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SOS Mascotas - Muro de Adopciones</title>
  <link rel="stylesheet" href="/styles-global.css">
  <link rel="stylesheet" href="/muro/muro.css">
</head>
<body>

  <header>
    <div class="logo">SOS Mascotas <span>🐾</span></div>
    <ul class="nav-links">
      <li><a href="../index.html">Inicio</a></li>
      <li><a href="index.html" class="active">Muro</a></li>
      <li><a href="../donaciones/index.html">Donaciones</a></li>
       <li><a href="../match/match.html">Match</a></li>
      <li><a href="../voluntarios/voluntarios.html">Voluntarios</a></li>
      <li><a href="../auth/index.html" id="nav-login">Ingresar</a></li>
      <li><a href="#" id="nav-logout" style="display: none; color: salmon; font-weight: bold;">Salir 🚪</a></li>
    </ul>
  </header>

  <main class="muro-container">
    <div class="header-titulos">
      <h1 class="titulo-pagina">SOS Mascotas</h1>
      <p class="subtitulo-pagina">Encontrá a tu próximo compañero de aventuras</p>
    </div>

    <section class="filtro-container">
      <div class="grupo-filtro">
        <label for="filter-especie">Especie</label>
        <select id="filter-especie" class="filtro-select">
          <option value="">Todos</option>
          <option value="Perro">Perros</option>
          <option value="Gato">Gatos</option>
        </select>
      </div>
      <div class="grupo-filtro">
        <label for="filter-tamanio">Tamaño</label>
        <select id="filter-tamanio" class="filtro-select">
          <option value="">Todos</option>
          <option value="Pequeño">Pequeño</option>
          <option value="Mediano">Mediano</option>
          <option value="Grande">Grande</option>
        </select>
      </div>
      <button id="btn-buscar" class="btn-primary">Filtrar Mascotas</button>
    </section>

    <section id="muro-mascotas" class="grilla-mascotas">
      </section>
  </main>

  <script src="muro.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const usuarioLogueado = JSON.parse(localStorage.getItem('usuario'));
    const loginLink = document.getElementById('nav-login');
    const logoutLink = document.getElementById('nav-logout'); // Capturamos el botón Salir

    if (usuarioLogueado && loginLink) {
      // 1. Cambiamos el texto al nombre del usuario
      loginLink.textContent = `Mi Perfil (${usuarioLogueado.nombre})`;
      loginLink.href = "../auth/index.html"; 

      // 2. Hacemos visible el botón de Cerrar Sesión
      if (logoutLink) {
        logoutLink.style.display = "inline-block";
        
        // 3. Escuchamos el clic para limpiar la sesión
        logoutLink.addEventListener("click", (e) => {
          e.preventDefault();
          localStorage.removeItem('usuario'); // Borra la sesión del navegador
          alert("Sesión cerrada correctamente. ¡Hasta luego! 🐾");
          
          // Redirecciona al inicio de forma limpia
          // Si estás en subcarpeta usa "../index.html", si estás en la raíz usa "index.html"
          window.location.href = "index.html"; 
        });
      }
    }
  });
</script>
  
</body>
</html>
